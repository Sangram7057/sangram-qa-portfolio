trigger: none
pr: none

pool:
  vmImage: "ubuntu-latest"

variables:
  workingDirectory: "automation-samples/restassured-framework"
  suiteProfile: "smoke"

stages:
  - stage: Build
    displayName: Build Framework
    jobs:
      - job: Compile
        steps:
          - task: Maven@4
            displayName: Compile Rest Assured framework
            inputs:
              mavenPomFile: "$(workingDirectory)/pom.xml"
              goals: "test-compile"
              publishJUnitResults: false
              javaHomeOption: "JDKVersion"
              jdkVersionOption: "1.17"

  - stage: ApiSuite
    displayName: Run API Suite
    dependsOn: Build
    condition: and(succeeded(), ne(variables['API_BASE_URL'], ''), ne(variables['API_TOKEN'], ''))
    jobs:
      - job: Execute
        steps:
          - task: Maven@4
            displayName: Run selected API suite
            inputs:
              mavenPomFile: "$(workingDirectory)/pom.xml"
              goals: "test -P$(suiteProfile)"
              publishJUnitResults: true
              testResultsFiles: "$(workingDirectory)/target/surefire-reports/TEST-*.xml"
              javaHomeOption: "JDKVersion"
              jdkVersionOption: "1.17"
