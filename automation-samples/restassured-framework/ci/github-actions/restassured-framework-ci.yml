name: Rest Assured Framework CI

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run when API secrets are available"
        required: false
        default: "smoke"
  pull_request:
    paths:
      - "automation-samples/restassured-framework/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation-samples/restassured-framework
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile framework
        run: mvn -q test-compile

  api-suite:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: automation-samples/restassured-framework
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}
      DEFAULT_ACCOUNT_ID: ${{ secrets.DEFAULT_ACCOUNT_ID }}
      DEFAULT_CUSTOMER_ID: ${{ secrets.DEFAULT_CUSTOMER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run selected API suite when secrets are available
        if: ${{ env.API_BASE_URL != '' && env.API_TOKEN != '' }}
        run: mvn test -P${{ github.event.inputs.suite }}
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restassured-allure-results
          path: automation-samples/restassured-framework/target/allure-results
          if-no-files-found: ignore
