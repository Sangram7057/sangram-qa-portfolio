name: Selenium Framework CI

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run when UI environment variables are available"
        required: false
        default: "smoke"
  pull_request:
    paths:
      - "automation-samples/selenium-framework/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation-samples/selenium-framework
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile framework
        run: mvn -q test-compile

  ui-suite:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: automation-samples/selenium-framework
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      HEADLESS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run selected Selenium suite when environment is available
        if: ${{ env.BASE_URL != '' && env.TEST_USERNAME != '' && env.TEST_PASSWORD != '' }}
        run: mvn test -P${{ github.event.inputs.suite }}
      - name: Upload framework artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-framework-artifacts
          path: |
            automation-samples/selenium-framework/target/extent-report
            automation-samples/selenium-framework/target/allure-results
            automation-samples/selenium-framework/target/screenshots
          if-no-files-found: ignore
